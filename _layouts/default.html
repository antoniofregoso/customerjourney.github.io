<html lang="en">

<head>
  {% include/website/head.html %}
  <meta property="og:title" content="{{ page.title }}" />
  <meta property="og:type" content="website" />

  <meta property="og:image" content="https://customerjourney.ninja/assets/images/custumerjourney_js.webp" />
